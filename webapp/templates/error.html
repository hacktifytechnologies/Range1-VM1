{% extends "base.html" %}
{% block title %}GePP - Error {{ code }}{% endblock %}
{% block content %}
<div class="main-content text-center py-5">
    <div class="container">
        <i class="fas fa-exclamation-circle fa-5x text-danger mb-4"></i>
        <h2>Error {{ code }}</h2>
        <p class="text-muted">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-govt mt-3"><i class="fas fa-home me-1"></i>Return Home</a>
    </div>
</div>
{% endblock %}
