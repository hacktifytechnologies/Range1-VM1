# ── Adversary Profile ─────────────────────────────────────────────────────
- id: gepp-adversary-sqli
  name: GePP SQLi Attack Chain
  description: >
    Full SQL injection attack chain against the Government
    e-Procurement Portal — from deployment through data exfiltration.
  atomic_ordering:
